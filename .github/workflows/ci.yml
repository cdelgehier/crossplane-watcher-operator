---
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  test-python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Lint
        run: uv run task lint
      - name: Format check
        run: uv run task fmt:check
      - name: Run tests
        run: uv run task test:py

  test-helm:
    name: Helm tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest
      - name: Install task
        uses: arduino/setup-task@v2
      - name: Run Helm tests
        run: task test:helm

  test-docker:
    name: Docker image tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install task
        uses: arduino/setup-task@v2
      - name: Install container-structure-test
        run: |
          curl -LO https://github.com/GoogleContainerTools/container-structure-test/releases/latest/download/container-structure-test-linux-amd64
          chmod +x container-structure-test-linux-amd64
          sudo mv container-structure-test-linux-amd64 /usr/local/bin/container-structure-test
      - name: Build and test Docker image
        run: task test:docker
