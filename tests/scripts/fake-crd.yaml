# Fake CRD to test the operator locally.
# Apply with: kubectl apply -f tests/scripts/fake-crd.yaml
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: fakeresources.homelab.crossplane.io
spec:
  group: homelab.crossplane.io
  names:
    kind: FakeResource
    listKind: FakeResourceList
    plural: fakeresources
    singular: fakeresource
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
