suite: rbac
templates:
  - templates/clusterrole.yaml
  - templates/clusterrolebinding.yaml
release:
  name: test-release
  namespace: crossplane-system

tests:
  # -----------------------------------------------------------------
  # ClusterRole
  # -----------------------------------------------------------------
  - it: should render a ClusterRole
    template: templates/clusterrole.yaml
    asserts:
      - isKind:
          of: ClusterRole

  - it: should set the correct name on ClusterRole
    template: templates/clusterrole.yaml
    asserts:
      - equal:
          path: metadata.name
          value: test-release-crossplane-watcher

  - it: should grant permissions on the watched api group
    template: templates/clusterrole.yaml
    asserts:
      - equal:
          path: rules[0].apiGroups[0]
          value: homelab.crossplane.io

  - it: should include get, list, watch, patch verbs
    template: templates/clusterrole.yaml
    asserts:
      - equal:
          path: rules[0].verbs
          value:
            - get
            - list
            - watch
            - patch

  - it: should use wildcard resources
    template: templates/clusterrole.yaml
    asserts:
      - equal:
          path: rules[0].resources[0]
          value: "*"

  - it: should use custom apiGroup
    template: templates/clusterrole.yaml
    set:
      config.apiGroup: custom.example.io
    asserts:
      - equal:
          path: rules[0].apiGroups[0]
          value: custom.example.io

  - it: should grant lease verbs for leader election
    template: templates/clusterrole.yaml
    asserts:
      - equal:
          path: rules[1].apiGroups[0]
          value: coordination.k8s.io
      - equal:
          path: rules[1].resources[0]
          value: leases

  # -----------------------------------------------------------------
  # ClusterRoleBinding
  # -----------------------------------------------------------------
  - it: should render a ClusterRoleBinding
    template: templates/clusterrolebinding.yaml
    asserts:
      - isKind:
          of: ClusterRoleBinding

  - it: should reference the ClusterRole
    template: templates/clusterrolebinding.yaml
    asserts:
      - equal:
          path: roleRef.kind
          value: ClusterRole
      - equal:
          path: roleRef.name
          value: test-release-crossplane-watcher

  - it: should reference the ServiceAccount
    template: templates/clusterrolebinding.yaml
    asserts:
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
      - equal:
          path: subjects[0].name
          value: test-release-crossplane-watcher
      - equal:
          path: subjects[0].namespace
          value: crossplane-system

  - it: should reference a custom serviceAccount name
    template: templates/clusterrolebinding.yaml
    set:
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: subjects[0].name
          value: custom-sa
