suite: serviceaccount
templates:
  - templates/serviceaccount.yaml
release:
  name: test-release
  namespace: crossplane-system

tests:
  # -----------------------------------------------------------------
  # Default: ServiceAccount created
  # -----------------------------------------------------------------
  - it: should render a ServiceAccount by default
    asserts:
      - isKind:
          of: ServiceAccount

  - it: should set the correct name
    asserts:
      - equal:
          path: metadata.name
          value: test-release-crossplane-watcher

  - it: should set the namespace
    asserts:
      - equal:
          path: metadata.namespace
          value: crossplane-system

  - it: should include standard labels
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: crossplane-watcher
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: test-release

  # -----------------------------------------------------------------
  # Custom name
  # -----------------------------------------------------------------
  - it: should allow overriding the name
    set:
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  # -----------------------------------------------------------------
  # Disabled
  # -----------------------------------------------------------------
  - it: should not render when create is false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0
