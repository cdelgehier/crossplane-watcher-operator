suite: secret
templates:
  - templates/secret.yaml
release:
  name: test-release
  namespace: crossplane-system

tests:
  # -----------------------------------------------------------------
  # Default: Secret created
  # -----------------------------------------------------------------
  - it: should render a Secret by default
    set:
      secret.githubToken: mytoken
    asserts:
      - isKind:
          of: Secret

  - it: should set the correct name
    set:
      secret.githubToken: mytoken
    asserts:
      - equal:
          path: metadata.name
          value: test-release-crossplane-watcher

  - it: should set the namespace
    set:
      secret.githubToken: mytoken
    asserts:
      - equal:
          path: metadata.namespace
          value: crossplane-system

  - it: should be of type Opaque
    set:
      secret.githubToken: mytoken
    asserts:
      - equal:
          path: type
          value: Opaque

  - it: should contain the github token key
    set:
      secret.githubToken: "ghp_mytoken"
    asserts:
      - equal:
          path: stringData.github_token
          value: "ghp_mytoken"

  # -----------------------------------------------------------------
  # existingSecret: Secret not created
  # -----------------------------------------------------------------
  - it: should not render a Secret when existingSecret is set
    set:
      existingSecret: my-external-secret
    asserts:
      - hasDocuments:
          count: 0
