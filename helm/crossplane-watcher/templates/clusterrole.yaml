apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "crossplane-watcher.fullname" . }}
  labels:
    {{- include "crossplane-watcher.labels" . | nindent 4 }}
rules:
  - apiGroups: ["{{ .Values.config.apiGroup }}"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
