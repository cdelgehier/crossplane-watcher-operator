apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "crossplane-watcher.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crossplane-watcher.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "crossplane-watcher.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "crossplane-watcher.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "crossplane-watcher.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: watcher
          image: {{ include "crossplane-watcher.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: CWO_GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "crossplane-watcher.secretName" . }}
                  key: github_token
            - name: CWO_API_GROUP
              value: {{ .Values.config.apiGroup | quote }}
            - name: CWO_DISCOVERY_INTERVAL_SECONDS
              value: {{ .Values.config.discoveryIntervalSeconds | quote }}
            - name: CWO_LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: CWO_KUBE_SSL_STRICT
              value: {{ .Values.config.kubeSslStrict | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import os, time; exit(0 if time.time() - os.stat('/tmp/healthy').st_mtime < {{ mul .Values.config.discoveryIntervalSeconds 3 }} else 1)"
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["test", "-f", "/tmp/ready"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
